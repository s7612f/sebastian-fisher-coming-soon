<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sebastian Fisher</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Courier+Prime&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0c0c0c;
      --fg:    #e8e0d0;
      --dim:   #6a6258;
      --accent:#c8a97e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    /* subtle noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.35;
    }

    .wrap {
      position: relative;
      text-align: center;
      max-width: 520px;
    }

    .rule {
      width: 48px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 36px;
      opacity: 0.5;
    }

    h1 {
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--fg);
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .sub {
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .message {
      font-size: 18px;
      font-weight: 300;
      font-style: italic;
      color: var(--dim);
      line-height: 1.7;
      margin-bottom: 48px;
    }

    .contact {
      font-family: 'Courier Prime', monospace;
      font-size: 12px;
      letter-spacing: 0.15em;
      color: var(--dim);
    }

    .contact a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .contact a:hover {
      border-color: var(--accent);
    }

    .rule-bottom {
      width: 48px;
      height: 1px;
      background: var(--accent);
      margin: 48px auto 0;
      opacity: 0.3;
    }

    .year {
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.2em;
      margin-top: 16px;
      opacity: 0.5;
    }

    /* fade in */
    .wrap { animation: fade 1.4s ease both; }
    @keyframes fade {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="rule"></div>

    <h1>Sebastian Fisher</h1>
    <p class="sub">Something is coming</p>

    <p class="message">
      A new space is being built.<br>
      Check back soon.
    </p>

    <p class="contact">
      In the meantime &mdash;
      <a href="mailto:sebastian.fisher@sauberprevost.com">get in touch</a>
    </p>

    <div class="rule-bottom"></div>
    <p class="year" id="yr"></p>
  </div>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
  </script>
</body>
</html>
